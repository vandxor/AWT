<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Job Application</title>
</head>
<body>

  <h2>Job Application Validation</h2>


  <label for="name">Name :   </label>
  <input type="text" name="name" id="name"><br><br>

   <label for="email">Email :   </label>
  <input type="text" name="email" id="email"><br><br>

   <label for="phone">Phone :   </label>
  <input type="number" name="phone" id="phone"><br><br>

   <label for="resume">Resume :   </label>
  <input type="file" name="resume" id="resume"><br><br>

  <label for="exp">Experience (years):   </label>
  <input type="number" name="exp" id="exp"><br><br>

  

  <fieldset>
    <legend>Skills
    </legend>

    <input type="checkbox" name="html" id="html">
  <label for="html">HTML</label>

  <input type="checkbox" name="css" id="css">
  <label for="css">CSS</label>

  <input type="checkbox" name="js" id="js">
  <label for="js">JavaScript</label>
  </fieldset><br>

  
  <label for="edu"> Highest Education : </label>
  <select name="edu" id="edu">
    <option value="">HighSchool</option>
    <option value="">Associate's Degree</option>
    <option value="">Bachelor's Degree</option>
    <option value="">Master's Degree</option>
    <option value="">PhD</option>
  </select><br><br>

   <fieldset>
    <legend>Availablity    </legend>

    <input type="radio" name="time" id="full">
  <label for="full">Full-time</label><br>

  <input type="radio" name="time" id="part">
  <label for="part">Part-time</label>


    </fieldset><br>

    <div>
      <label for="comment">Additional Comments :</label> <br>

      <textarea name="comment" id="comment" cols="40" rows="10"></textarea><br>


      <input type="submit" value="Submit" id ="submit">

      <input type="submit" value="Clear" id ="clear">







    </div>


  
</body>
</html>
